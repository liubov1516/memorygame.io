<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Memory Pair Game</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="app">
    <div class="settings-panel" id="settingsPanel">
        <h2 class="settings-title">Налаштування гри</h2>

        <div class="settings-mode">
            <label class="mode-label">Режим гри:</label>
            <div class="mode-btns">
                <button class="mode-btn active" id="mode1p" onclick="setMode(1)">1 гравець</button>
                <button class="mode-btn" id="mode2p" onclick="setMode(2)">2 гравці</button>
            </div>
        </div>

        <div class="player-names" id="playerNames">
            <div class="name-row" id="p1row">
                <label>Гравець 1:</label>
                <input type="text" id="p1name" placeholder="Ім'я гравця 1" maxlength="20" />
            </div>
            <div class="name-row hidden" id="p2row">
                <label>Гравець 2:</label>
                <input type="text" id="p2name" placeholder="Ім'я гравця 2" maxlength="20" />
            </div>
        </div>

        <div class="settings-grid">
            <div class="setting-group">
                <label>Рядки:</label>
                <select id="rowsSelect">
                    <option value="4" selected>4</option>
                    <option value="5">5</option>
                    <option value="6">6</option>
                </select>
            </div>
            <div class="setting-group">
                <label>Стовпці:</label>
                <select id="colsSelect">
                    <option value="4" selected>4</option>
                    <option value="5">5</option>
                    <option value="6">6</option>
                </select>
            </div>
            <div class="setting-group">
                <label>Складність:</label>
                <select id="diffSelect">
                    <option value="easy" selected>Easy (3 хв)</option>
                    <option value="normal">Normal (2 хв)</option>
                    <option value="hard">Hard (1 хв)</option>
                </select>
            </div>
            <div class="setting-group">
                <label>Раундів:</label>
                <input type="number" id="roundsInput" value="1" min="1" max="5" />
            </div>
        </div>

        <div class="settings-actions">
            <button class="btn btn-secondary" onclick="resetSettings()">Скинути налаштування</button>
            <button class="btn btn-primary" onclick="startGame()">Розпочати гру</button>
        </div>
    </div>

    <div class="game-area hidden" id="gameArea">
        <div class="game-header">
            <div class="game-info-row">
                <div class="info-box" id="timerBox">
                    <span class="info-label">Час</span>
                    <span class="info-value" id="timerDisplay">3:00</span>
                </div>
                <div class="info-box" id="movesBox">
                    <span class="info-label">Ходів</span>
                    <span class="info-value" id="movesDisplay">0</span>
                </div>
                <div class="info-box" id="pairsBox">
                    <span class="info-label">Пари</span>
                    <span class="info-value" id="pairsDisplay">0</span>
                </div>
                <div class="info-box" id="roundBox">
                    <span class="info-label">Раунд</span>
                    <span class="info-value" id="roundDisplay">1/1</span>
                </div>
            </div>

            <div class="player-turn-bar" id="playerTurnBar">
                <span id="currentPlayerLabel">Хід гравця: <strong id="currentPlayerName">—</strong></span>
            </div>

            <div class="game-actions">
                <button class="btn btn-secondary small" onclick="showSettings()">Налаштування</button>
                <button class="btn btn-danger small" onclick="restartRound()">Рестарт</button>
            </div>
        </div>

        <div class="board" id="board"></div>
    </div>

    <div class="modal-overlay hidden" id="modalOverlay">
        <div class="modal" id="modal">
            <div class="modal-icon" id="modalIcon">Ура</div>
            <h2 id="modalTitle">Вітаємо!</h2>
            <p id="modalMessage"></p>
            <div id="statsContainer"></div>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="showSettings()">Налаштування</button>
                <button class="btn btn-primary" onclick="nextRound()" id="nextRoundBtn">Наступний раунд</button>
                <button class="btn btn-primary hidden" onclick="startGame()" id="playAgainBtn">Грати знову</button>
            </div>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
